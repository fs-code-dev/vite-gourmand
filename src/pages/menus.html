<div class="hero-scene text-center text-white py-5">
  <div class="hero-scene-content">
    <h1 class="fw-bold text-white">Nos Menus</h1>
    <p>Découvrez toutes nos offres gourmandes</p>
  </div>
</div>

<div class="container py-5">

  <!-- FILTRES -->
  <div class="card filter-card mb-4 shadow-sm border-0">
    <div class="card-body">
      <div class="row g-3">

        <div class="col-md-3 col-6">
          <input id="prixMax" type="number" class="form-control" placeholder="Prix max" aria-label="Prix maximum">
        </div>

        <div class="col-md-3 col-6">
          <input id="prixMin" type="number" class="form-control" placeholder="Prix min" aria-label="Prix minimum">
        </div>

        <div class="col-md-3 col-6">
          <select id="theme" class="form-select" aria-label="Filtrer par thème">
            <option value="">Thème (Tous)</option>
            <option value="noel">Noël</option>
            <option value="classique">Classique</option>
            <option value="paques">Pâques</option>
            <option value="evenement">Événement</option>
          </select>
        </div>

        <div class="col-md-3 col-6">
          <select id="regime" class="form-select" aria-label="Filtrer par régime">
            <option value="">Régime (Tous)</option>
            <option value="vegan">Vegan</option>
            <option value="classique">Classique</option>
            <option value="vegetarien">Végétarien</option>
          </select>
        </div>

        <div class="col-md-3 col-6">
          <input id="nbMin" type="number" class="form-control" placeholder="Nb pers min" aria-label="Nombre de personnes minimum">
        </div>

      </div>
    </div>
  </div>

  <!-- BOUTONS FILTRES -->
  <div class="d-flex justify-content-center gap-3 mb-5">
    <button id="applyFilters" class="btn btn-primary px-4">Appliquer les filtres</button>
    <button id="resetFilters" class="btn btn-outline-secondary px-4">Réinitialiser</button>
  </div>

  <!-- GRID DES MENUS -->
  <div id="menusContainer" class="row g-4"></div>

</div>
