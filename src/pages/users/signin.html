<div class="hero-scene text-center text-white bg-dark py-5">
  <div class="hero-scene-content">
    <h1 class="fw-bold">Connexion</h1>
  </div>
</div>

<div class="container py-5" style="max-width: 500px;">
  
  <form id="signinForm" class="card shadow-sm border-0 p-4 mb-4">
    
    <div class="mb-3">
      <label for="EmailInput" class="form-label fw-bold">Email</label>
      <input type="email" class="form-control" id="EmailInput" placeholder="test@mail.fr" required>
    </div>
    <div class="mb-3">
      <label for="PasswordInput" class="form-label fw-bold">Mot de passe</label>
      <input type="password" class="form-control" id="PasswordInput" required>
    </div>
    <div class="d-flex justify-content-end mb-4 small">
      <a href="#" id="forgotPasswordBtn" class="text-decoration-none">Mot de passe oublié ?</a>
    </div>

    <div class="text-center">
      <button type="submit" class="btn btn-primary w-100">Se connecter</button>
    </div>

  </form>

  <div class="text-center pt-3 border-top">
    <a href="/signup" data-link class="text-decoration-none">Vous n'avez pas de compte ? Inscrivez-vous ici</a>
  </div>

</div>

<script type="module" src="/src/assets/js/auth.js"></script>
