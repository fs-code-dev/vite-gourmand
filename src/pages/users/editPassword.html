<div class="hero-scene text-center text-white bg-dark py-5">
  <div class="hero-scene-content">
    <h1 class="fw-bold text-white">Modifier mon mot de passe</h1>
  </div>
</div>

<div class="container py-5" style="max-width: 600px;">
  
  <form id="editPasswordForm" class="card shadow-sm border-0 p-4 mb-4 border-top border-4 border-primary">
    
    <div class="alert alert-warning small mb-4"><i class="bi bi-lock"></i>
       Votre nouveau mot de passe doit respecter les mêmes règles de sécurité strictes.
    </div>

    <div class="mb-3">
      <label for="PasswordInput" class="form-label fw-bold">Nouveau mot de passe</label>
      <input type="password" class="form-control" id="PasswordInput" required>
      <div class="form-text text-muted small">
        Au moins 10 caractères, dont 1 majuscule, 1 minuscule, 1 chiffre et 1 caractère spécial.
      </div>
    </div>

    <div class="mb-4">
      <label for="ValidatePasswordInput" class="form-label fw-bold">Validez le nouveau mot de passe</label>
      <input type="password" class="form-control" id="ValidatePasswordInput" required>
      <div id="passwordError" class="text-danger small d-none mt-1">Les mots de passe ne correspondent pas.</div>
    </div>

    <div class="text-center">
      <button type="submit" class="btn btn-primary w-100">Changer mon mot de passe</button>
    </div>
    
  </form>

  <div class="d-flex justify-content-between pt-3 border-top">
    <a href="/userSpace" data-link class="text-decoration-none">⬅ Retour à mon espace</a>
    <a href="/modifyUserInfo" data-link class="text-decoration-none">Modifier mes infos</a>
  </div>

</div>

<script type="module" src="/src/assets/js/auth.js"></script>
