<div class="hero-scene text-center text-white py-5">
  <div class="hero-scene-content">
    <h1 class="fw-bold text-white">Inscription</h1>
  </div>
</div>

<div class="container mt-4 mb-5" style="max-width: 600px;">
  <form id="signupForm">
    
    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="NomInput" class="form-label">Nom</label>
        <input type="text" class="form-control" id="NomInput" placeholder="Votre nom" required>
      </div>
      <div class="col-md-6 mb-3">
        <label for="PrenomInput" class="form-label">Prénom</label>
        <input type="text" class="form-control" id="PrenomInput" placeholder="Votre prénom" required>
      </div>
    </div>

    
    <div class="mb-3">
      <label for="GsmInput" class="form-label">Numéro de téléphone (GSM)</label>
      <input type="tel" class="form-control" id="GsmInput" placeholder="06 00 00 00 00" required>
    </div>

    <div class="mb-3">
      <label for="AddressInput" class="form-label">Adresse postale</label>
      <input type="text" class="form-control" id="AddressInput" placeholder="1 rue des chats, 33000 Bordeaux" required>
    </div>
 

    <div class="mb-3">
      <label for="EmailInput" class="form-label">Email</label>
      <input type="email" class="form-control" id="EmailInput" placeholder="test@mail.fr" required>
    </div>

    <div class="mb-3">
      <label for="PasswordInput" class="form-label">Mot de passe</label>
      <input type="password" class="form-control" id="PasswordInput" required>
      
      <div class="form-text text-muted small">
        Votre mot de passe doit contenir au moins 10 caractères, dont une majuscule, une minuscule, un chiffre et un caractère spécial.
      </div>
    </div>

    <div class="mb-3">
      <label for="ValidatePasswordInput" class="form-label">Validez votre mot de passe</label>
      <input type="password" class="form-control" id="ValidatePasswordInput" required>
      <div id="passwordError" class="text-danger small d-none">Les mots de passe ne correspondent pas.</div>
    </div>

    <div class="text-center mt-4">
      <button type="submit" class="btn btn-primary px-5">M'inscrire</button>
    </div>
    
  </form>

  <div class="text-center pt-4">
    
    <a href="/signin" data-link>Vous avez déjà un compte ? Connectez-vous ici</a>
  </div>
</div>
